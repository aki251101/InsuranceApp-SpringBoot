# ============================================================
# Stub プロファイル用設定
# ============================================================
# spring.profiles.active=stub のときに読み込まれる。
# application.yaml の共通設定を継承しつつ、Stub固有の設定を上書きする。
# ============================================================

logging:
  level:
    jp.yoshiaki.insuranceapp.client.stub: DEBUG

calendar:
  api:
    enabled: false

ai:
  api:
    enabled: false
  client:
    type: stub

gemini:
  api:
    key: dummy
    base-url: http://localhost/dummy
    model: dummy-model

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/insuranceapp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  sql:
    init:
      mode: never

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
