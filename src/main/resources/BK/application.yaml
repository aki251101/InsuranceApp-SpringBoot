spring:
  application:
    name: InsuranceApp-SpringBoot

  # ===== H2データベース設定（学習用） =====
  datasource:
    url: jdbc:h2:mem:day66;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # ===== JPA設定 =====
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===== H2 Console（ブラウザでDB確認用） =====
  h2:
    console:
      enabled: true
      path: /h2-console

  # ===== Profile設定（Day70で追加） =====
  profiles:
    active: dev

server:
  port: 8080
  error:
    include-message: always

# ===== アプリ独自設定（Day70で追加） =====
app:
  app-name: "タスク管理"
  version: "1.0.0"
  env: "default"
  max-tasks: 5

---

# === Day78: 天気API設定 ===
# dev プロファイルの場合はFake実装が使われるため、この設定は不要
# prod プロファイルの場合のみ必須

spring:
  profiles:
    active: dev  # ← 開発中は dev（Fake実装が動く）

# prod 用の設定（prod プロファイルでのみ使用）
weather:
  api:
    base-url: https://api.openweathermap.org/data/2.5/weather
    key: YOUR_API_KEY_HERE