<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>事故一覧</title>
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Accident Management</p>
        <h1>事故一覧</h1>
        <p class="lead">対応状況と滞留案件を確認できます。</p>
    </section>

    <section class="panel">
        <div class="panel-header-row">
            <p class="back-link">
                <a href="/">トップページへ</a>
                <span aria-hidden="true">/</span>
                <a th:href="@{/policies}">契約一覧</a>
            </p>

            <div class="list-action-row">
                <a class="new-entry-button" th:href="@{/accidents/new}">事故新規登録</a>
            </div>
        </div>

        <nav class="tabs">
            <a th:href="@{/accidents(tab='OPEN_INPROGRESS',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'OPEN_INPROGRESS'} ? 'active' : ''">受付 / 対応中</a>
            <a th:href="@{/accidents(tab='RESOLVED',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'RESOLVED'} ? 'active' : ''">完了</a>
            <a th:href="@{/accidents(tab='ALL',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'ALL'} ? 'active' : ''">全件</a>
        </nav>
    </section>

    <section class="panel table-panel">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/accidents(tab=${currentTab},sort='id',direction=${currentSort == 'id' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            ID <span th:if="${currentSort == 'id'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/accidents(tab=${currentTab},sort='occurredAt',direction=${currentSort == 'occurredAt' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            受付日 <span th:if="${currentSort == 'occurredAt'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/accidents(tab=${currentTab},sort='policyNumber',direction=${currentSort == 'policyNumber' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            契約番号 <span th:if="${currentSort == 'policyNumber'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/accidents(tab=${currentTab},sort='customerName',direction=${currentSort == 'customerName' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            契約者名 <span th:if="${currentSort == 'customerName'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/accidents(tab=${currentTab},sort='status',direction=${currentSort == 'status' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            状態 <span th:if="${currentSort == 'status'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/accidents(tab=${currentTab},sort='stagnant',direction=${currentSort == 'stagnant' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            滞留 <span th:if="${currentSort == 'stagnant'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(response.items)}">
                    <td colspan="7" class="empty">事故データがありません。</td>
                </tr>
                <tr th:each="a : ${response.items}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.occurredAt}"></td>
                    <td th:text="${a.policyNumber}"></td>
                    <td th:text="${a.customerName}"></td>
                    <td><span class="badge" th:text="${a.status}"></span></td>
                    <td>
                        <span th:if="${a.stagnant}" class="badge danger">滞留</span>
                        <span th:unless="${a.stagnant}" class="muted">-</span>
                    </td>
                    <td>
                        <a th:href="@{/accidents/{id}(id=${a.id})}">詳細</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

</body>
</html>
