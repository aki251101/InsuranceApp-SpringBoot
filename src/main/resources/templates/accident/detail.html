<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>事故詳細</title>
</head>
<body>
<h1>事故詳細</h1>

<div th:if="${successMessage}" style="color: green;">
    <p th:text="${successMessage}"></p>
</div>
<div th:if="${errorMessage}" style="color: red;">
    <p th:text="${errorMessage}"></p>
</div>

<p>
    <a th:href="@{/accidents}">一覧へ戻る</a> /
    <a href="/">トップページへ</a>
</p>

<div th:if="${accident}">
    <table border="1" cellpadding="6" cellspacing="0">
        <tr><th scope="row">ID</th><td th:text="${accident.id}"></td></tr>
        <tr>
            <th scope="row">契約番号</th>
            <td>
                <a th:if="${accident.policyId != null}"
                   th:href="@{/policies/{id}(id=${accident.policyId})}"
                   th:text="${accident.policyNumber}"></a>
                <span th:unless="${accident.policyId != null}"
                      th:text="${accident.policyNumber}"></span>
            </td>
        </tr>
        <tr><th scope="row">契約者名</th><td th:text="${accident.customerName}"></td></tr>
        <tr><th scope="row">受付日</th><td th:text="${accident.occurredAt}"></td></tr>
        <tr><th scope="row">事故場所</th><td th:text="${accident.place}"></td></tr>
        <tr><th scope="row">事故概要</th><td th:text="${accident.description}"></td></tr>
        <tr><th scope="row">状態</th><td th:text="${accident.status}"></td></tr>
        <tr><th scope="row">最終対応日時</th><td th:text="${accident.lastContactedAt}"></td></tr>
        <tr><th scope="row">対応履歴メモ</th><td style="white-space: pre-wrap;" th:text="${accident.memo}"></td></tr>
        <tr>
            <th scope="row">滞留</th>
            <td>
                <span th:if="${accident.stagnant}" style="color:red;">滞留</span>
                <span th:unless="${accident.stagnant}">-</span>
            </td>
        </tr>
    </table>

    <h2>操作</h2>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <form th:if="${accident.canStartProgress}"
              th:action="@{/accidents/{id}/start-progress(id=${accident.id})}" method="post">
            <button type="submit">対応開始</button>
        </form>

        <form th:if="${accident.canContact}"
              th:action="@{/accidents/{id}/contacted(id=${accident.id})}" method="post">
            <button type="submit">対応した</button>
        </form>

        <form th:if="${accident.canResolve}"
              th:action="@{/accidents/{id}/resolve(id=${accident.id})}" method="post">
            <button type="submit">完了</button>
        </form>
    </div>

    <h2>対応履歴メモ</h2>
    <p style="font-size: 0.9em; color: #555;">
        ※対応履歴メモの保存だけでは、最終対応日時は更新されません。お客さまへの連絡などを行った場合は、「対応した」ボタンも押してください。
    </p>
    <form th:action="@{/accidents/{id}/memo(id=${accident.id})}" method="post">
        <label for="memo">対応履歴メモの内容</label>
        <div>
            <textarea id="memo" name="memo" rows="4" cols="60" maxlength="2000"
                  th:text="${accident.memo}"></textarea>
        </div>
        <div>
            <button type="submit">対応履歴メモを保存</button>
        </div>
    </form>

    <h2>AI提案</h2>
    <form th:action="@{/accidents/{id}/ai-suggest(id=${accident.id})}" method="post">
        <button type="submit">AI次アクション候補</button>
    </form>

    <div th:if="${aiSuggestion}" style="margin-top: 12px; white-space: pre-wrap; border: 1px solid #ccc; padding: 8px;">
        <strong>AI提案（参考）</strong>
        <p th:text="${aiSuggestion}"></p>
    </div>
</div>

</body>
</html>
