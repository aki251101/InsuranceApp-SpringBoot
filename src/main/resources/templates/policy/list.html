<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>契約一覧</title>
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Policy Management</p>
        <h1>契約一覧</h1>
        <p class="lead">契約状況と更新対象を一覧で確認できます。</p>
    </section>

    <div th:if="${successMessage}" class="alert success">
        <p th:text="${successMessage}"></p>
    </div>
    <div th:if="${errorMessage}" class="alert error">
        <p th:text="${errorMessage}"></p>
    </div>

    <section class="panel">
        <p class="back-link"><a href="/">トップページへ</a></p>

        <nav class="tabs">
            <a th:href="@{/policies(tab='RENEWABLE',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'RENEWABLE'} ? 'active' : ''">更新可能</a>
            <a th:href="@{/policies(tab='ACTIVE',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'ACTIVE'} ? 'active' : ''">契約中</a>
            <a th:href="@{/policies(tab='CANCELLED',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'CANCELLED'} ? 'active' : ''">解約</a>
            <a th:href="@{/policies(tab='LAPSED',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'LAPSED'} ? 'active' : ''">失効</a>
            <a th:href="@{/policies(tab='ALL',sort=${currentSort},direction=${currentDirection})}" th:classappend="${currentTab == 'ALL'} ? 'active' : ''">全件</a>
        </nav>

        <form class="search-form" th:action="@{/policies}" method="get">
            <input type="hidden" name="tab" th:value="${currentTab}">
            <input type="hidden" name="sort" th:value="${currentSort}">
            <input type="hidden" name="direction" th:value="${currentDirection}">
            <input type="text" name="q" th:value="${searchQuery}" placeholder="契約番号/契約者名で検索">
            <button type="submit">検索</button>
        </form>

        <div class="stats" th:if="${response != null and response.stats != null}">
            <p>当年度早期更改率: <strong th:text="${response.stats.fiscalYearRate}">-</strong></p>
            <p>当月早期更改率: <strong th:text="${response.stats.monthRate}">-</strong></p>
        </div>
    </section>

    <section class="panel table-panel">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='id',direction=${currentSort == 'id' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            ID <span th:if="${currentSort == 'id'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='policyNumber',direction=${currentSort == 'policyNumber' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            契約番号 <span th:if="${currentSort == 'policyNumber'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='customerName',direction=${currentSort == 'customerName' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            契約者名 <span th:if="${currentSort == 'customerName'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='startDate',direction=${currentSort == 'startDate' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            開始日 <span th:if="${currentSort == 'startDate'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='endDate',direction=${currentSort == 'endDate' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            満期日 <span th:if="${currentSort == 'endDate'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='status',direction=${currentSort == 'status' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            状態 <span th:if="${currentSort == 'status'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='attentionRequired',direction=${currentSort == 'attentionRequired' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            要注意 <span th:if="${currentSort == 'attentionRequired'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="sort-link"
                           th:href="@{/policies(tab=${currentTab},q=${searchQuery},sort='calendarRegistered',direction=${currentSort == 'calendarRegistered' and currentDirection == 'asc' ? 'desc' : 'asc'})}">
                            カレンダー <span th:if="${currentSort == 'calendarRegistered'}" th:text="${currentDirection == 'asc' ? '▲' : '▼'}"></span>
                        </a>
                    </th>
                    <th scope="col">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${response == null or #lists.isEmpty(response.items)}">
                    <td colspan="9" class="empty">契約データがありません。</td>
                </tr>
                <tr th:each="p : ${response.items}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.policyNumber}"></td>
                    <td th:text="${p.customerName}"></td>
                    <td th:text="${p.startDate}"></td>
                    <td th:text="${p.endDate}"></td>
                    <td><span class="badge" th:text="${p.status}"></span></td>
                    <td>
                        <span th:if="${p.attentionRequired}" class="badge warn">要注意</span>
                        <span th:unless="${p.attentionRequired}" class="muted">-</span>
                    </td>
                    <td>
                        <span th:if="${p.calendarRegistered}" class="badge ok">登録済み</span>
                        <span th:unless="${p.calendarRegistered}" class="muted">未登録</span>
                    </td>
                    <td>
                        <a th:href="@{/policies/{id}(id=${p.id})}">詳細</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
