<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>損保業務支援アプリ | ダッシュボード</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <script defer th:src="@{/js/home-carousel.js}"></script>
</head>
<body>
<main class="page">
    <section class="hero">
        <p class="eyebrow">Insurance Operations Support App</p>
        <h1>損保業務支援アプリ</h1>
        <p class="lead">契約・事故対応の進捗を一元管理し、更新漏れと対応遅延を防ぐための業務支援アプリです。</p>
    </section>

    <section class="banner-carousel" aria-label="アプリの主要機能">
        <div class="carousel-viewport">
            <div class="carousel-track">
                <article class="carousel-slide">
                    <img th:src="@{/images/home-banners/01-early-renewal-rate.svg}"
                         src="/images/home-banners/01-early-renewal-rate.svg"
                         alt="早期更改率を見える化し、余裕ある更新対応を支援">
                </article>
                <article class="carousel-slide">
                    <img th:src="@{/images/home-banners/02-renewal-deadline-alert.svg}"
                         src="/images/home-banners/02-renewal-deadline-alert.svg"
                         alt="更新期限を過ぎた契約を要注意として通知">
                </article>
                <article class="carousel-slide">
                    <img th:src="@{/images/home-banners/03-accident-stagnation-alert.svg}"
                         src="/images/home-banners/03-accident-stagnation-alert.svg"
                         alt="最終対応から7日経過した事故案件を滞留として通知">
                </article>
                <article class="carousel-slide">
                    <img th:src="@{/images/home-banners/04-calendar-reminder-v2.svg}"
                         src="/images/home-banners/04-calendar-reminder-v2.svg"
                         alt="更新予定をカレンダーに登録し、リマインダーで更新漏れを防止">
                </article>
                <article class="carousel-slide">
                    <img th:src="@{/images/home-banners/05-ai-assist-tabs.svg}"
                         src="/images/home-banners/05-ai-assist-tabs.svg"
                         alt="契約詳細のAI要約と事故詳細のAI提案で、確認と対応を効率化">
                </article>
            </div>
        </div>

        <button class="carousel-control carousel-control-prev" type="button" aria-label="前のバナーを表示">
            <span aria-hidden="true">‹</span>
        </button>
        <button class="carousel-control carousel-control-next" type="button" aria-label="次のバナーを表示">
            <span aria-hidden="true">›</span>
        </button>

        <div class="carousel-indicators" aria-label="バナーを選択"></div>
        <p class="carousel-status" aria-live="polite" aria-atomic="true"></p>
    </section>

    <section class="action-panel" aria-label="メニュー">
        <a class="action-card" th:href="@{/policies}">
            <h2>契約一覧</h2>
            <p>契約中・失効・解約の確認、更新状況の把握、AI要約・カレンダー連携に進みます。</p>
            <span>開く</span>
        </a>
        <a class="action-card" th:href="@{/accidents}">
            <h2>事故一覧</h2>
            <p>事故受付後の対応進捗、滞留リスク、AI次アクション提案の確認に進みます。</p>
            <span>開く</span>
        </a>
    </section>
</main>
</body>
</html>
