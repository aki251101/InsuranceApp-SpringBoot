<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="600" viewBox="0 0 1800 600" role="img" aria-labelledby="title desc">
  <title id="title">事故対応の滞留を防ぐ</title>
  <desc id="desc">最終対応から7日経過した事故案件を滞留バッジで知らせるバナー</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f9fcff"/>
      <stop offset="1" stop-color="#e8f4ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf5ff"/>
      <stop offset="1" stop-color="#d7eaff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43a0ff"/>
      <stop offset="1" stop-color="#0767e6"/>
    </linearGradient>
    <linearGradient id="warning" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#fffdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#16467d" flood-opacity="0.13"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#16467d" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif; }
      .navy { fill: #082e6b; }
      .muted { fill: #3970b4; }
      .heading { font-weight: 800; letter-spacing: .01em; }
      .body { font-weight: 700; }
      .small { font-size: 17px; font-weight: 700; }
      .rowText { font-size: 19px; font-weight: 700; fill: #082e6b; }
    </style>
  </defs>

  <rect x="2" y="2" width="1796" height="596" rx="34" fill="url(#bg)" stroke="#bfd5ee" stroke-width="4"/>
  <path d="M0 404 C239 466 414 416 639 486 C892 565 1140 628 1800 441 L1800 600 L0 600 Z" fill="url(#wave)" opacity=".94"/>
  <path d="M0 496 C288 423 451 482 671 552 C947 640 1269 617 1800 464" fill="none" stroke="#ffffff" stroke-width="3" opacity=".92"/>

  <g fill="#d7e9fc">
    <circle cx="68" cy="53" r="4"/><circle cx="94" cy="53" r="4"/><circle cx="120" cy="53" r="4"/><circle cx="146" cy="53" r="4"/>
    <circle cx="68" cy="79" r="4"/><circle cx="94" cy="79" r="4"/><circle cx="120" cy="79" r="4"/><circle cx="146" cy="79" r="4"/>
    <circle cx="68" cy="105" r="4"/><circle cx="94" cy="105" r="4"/><circle cx="120" cy="105" r="4"/><circle cx="146" cy="105" r="4"/>
  </g>

  <g transform="translate(58 188)">
    <text class="navy heading" font-size="68">事故対応の滞留を防ぐ</text>
    <text class="navy body" y="82" font-size="32">最終対応から7日経過した案件を「滞留」でお知らせ</text>
  </g>

  <g transform="translate(712 353)" filter="url(#softShadow)">
    <circle cx="91" cy="91" r="91" fill="#ffffff" stroke="#e0edf9" stroke-width="2"/>
    <circle cx="91" cy="91" r="69" fill="none" stroke="#e5f1fd" stroke-width="17"/>
    <path d="M91 22 A69 69 0 0 1 155 117" fill="none" stroke="url(#blue)" stroke-width="17"/>
    <path d="M151 104l16 18-23 4z" fill="#1e79ea"/>
    <circle cx="91" cy="81" r="31" fill="#ffffff" stroke="#1257a8" stroke-width="4"/>
    <path d="M91 62v22l14 11" fill="none" stroke="#1257a8" stroke-width="4" stroke-linecap="round"/>
    <text x="91" y="149" text-anchor="middle" font-size="34" font-weight="800" fill="#0965dc">7日</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="960" y="80" width="770" height="444" rx="24" fill="#ffffff" stroke="#d8e7f6" stroke-width="2"/>
  </g>
  <g transform="translate(990 103)">
    <rect width="48" height="48" rx="12" fill="url(#blue)"/>
    <rect x="12" y="14" width="24" height="25" rx="3" fill="#ffffff"/>
    <path d="M18 11h12v8H18z" fill="#dcecff"/>
    <path d="M18 25h12M18 31h12" stroke="#3289ee" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="1056" y="139" class="navy heading" font-size="27">事故対応一覧</text>
  <line x1="982" y1="165" x2="1707" y2="165" stroke="#dce9f7" stroke-width="2"/>
  <text x="1050" y="201" class="muted small">案件番号</text>
  <text x="1322" y="201" class="muted small">ステータス</text>
  <text x="1500" y="201" class="muted small">最終対応</text>

  <g>
    <rect x="982" y="218" width="725" height="80" rx="17" fill="#ffffff" stroke="#dce9f7" stroke-width="2"/>
    <g transform="translate(1006 236)">
      <rect width="42" height="45" rx="9" fill="#eef5fd"/>
      <path d="M13 8h12l7 7v22H13z" fill="url(#blue)" opacity=".7"/>
      <path d="M25 8v8h8M18 23h10M18 28h10M18 33h8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="1067" y="267" class="rowText">ACD-2025-00123</text>
    <rect x="1308" y="235" width="112" height="44" rx="12" fill="#edf6ff" stroke="#95c4f5"/>
    <circle cx="1331" cy="257" r="13" fill="url(#blue)"/>
    <path d="M1325 257l5 5 8-10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1349" y="264" font-size="17" font-weight="700" fill="#1370df">対応中</text>
    <text x="1498" y="267" class="rowText">最終対応 2日前</text>
    <circle cx="1670" cy="258" r="20" fill="url(#blue)"/>
    <path d="M1661 253l9 9 9-9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="960" y="311" width="770" height="88" rx="18" fill="url(#warning)" stroke="#f6b431" stroke-width="2"/>
  </g>
  <g transform="translate(986 331)">
    <rect width="42" height="45" rx="9" fill="#eef5fd"/>
    <path d="M13 8h12l7 7v22H13z" fill="url(#blue)" opacity=".7"/>
    <path d="M25 8v8h8M18 23h10M18 28h10M18 33h8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="1047" y="362" class="rowText">ACD-2025-00124</text>
  <rect x="1308" y="329" width="98" height="48" rx="13" fill="#fff9ea" stroke="#f1ad24"/>
  <text x="1357" y="361" text-anchor="middle" font-size="21" font-weight="800" fill="#dc7200">滞留</text>
  <text x="1498" y="362" font-size="19" font-weight="800" fill="#e67600">最終対応 7日前</text>
  <circle cx="1670" cy="355" r="20" fill="#f4a000"/>
  <path d="M1665 346l9 9-9 9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="982" y="413" width="725" height="80" rx="17" fill="#ffffff" stroke="#dce9f7" stroke-width="2"/>
    <g transform="translate(1006 431)">
      <rect width="42" height="45" rx="9" fill="#eef5fd"/>
      <path d="M13 8h12l7 7v22H13z" fill="url(#blue)" opacity=".7"/>
      <path d="M25 8v8h8M18 23h10M18 28h10M18 33h8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="1067" y="462" class="rowText">ACD-2025-00125</text>
    <rect x="1308" y="430" width="112" height="44" rx="12" fill="#edf6ff" stroke="#95c4f5"/>
    <circle cx="1331" cy="452" r="13" fill="url(#blue)"/>
    <path d="M1325 452l5 5 8-10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1349" y="459" font-size="17" font-weight="700" fill="#1370df">対応中</text>
    <text x="1498" y="462" class="rowText">最終対応 1日前</text>
    <circle cx="1670" cy="453" r="20" fill="url(#blue)"/>
    <path d="M1661 448l9 9 9-9" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
