<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="600" viewBox="0 0 1800 600" role="img" aria-labelledby="title desc">
  <title id="title">更新予定をカレンダーへ</title>
  <desc id="desc">契約更新予定をカレンダーに登録し、リマインダーで更新漏れを防ぐバナー</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".62" stop-color="#f9fcff"/><stop offset="1" stop-color="#e6f2ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#edf6ff"/><stop offset="1" stop-color="#d8ebff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#45a0ff"/><stop offset="1" stop-color="#0867e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="11" stdDeviation="14" flood-color="#16467d" flood-opacity=".14"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#16467d" flood-opacity=".15"/>
    </filter>
    <style>
