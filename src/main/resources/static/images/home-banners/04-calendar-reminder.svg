      .heading{font-weight:800}.body{font-weight:700}.small{font-size:14px;font-weight:700}.row{font-size:16px;font-weight:700;fill:#082e6b}
    </style>
  </defs>
  <rect x="2" y="2" width="1796" height="596" rx="34" fill="url(#bg)" stroke="#bfd5ee" stroke-width="4"/>
  <path d="M0 425C220 405 330 550 565 536c242-14 358-109 604-38 206 60 355 93 631-29v131H0z" fill="url(#wave)"/>
  <path d="M0 518c265-40 429 56 654 66 303 14 497-93 746-71 150 13 265 7 400-31" fill="none" stroke="#fff" stroke-width="3"/>
  <g fill="#d5e8fb">
