<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="600" viewBox="0 0 1800 600" role="img" aria-labelledby="title desc">
  <title id="title">次の行動をAIが提案</title>
  <desc id="desc">案件情報から次の行動と注意点をAIが整理し、担当者の判断を支援するバナー</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff"/><stop offset=".62" stop-color="#f9fcff"/><stop offset="1" stop-color="#e6f2ff"/></linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#edf6ff"/><stop offset="1" stop-color="#d8ebff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#45a0ff"/><stop offset="1" stop-color="#0867e8"/></linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#318bf2"/><stop offset="1" stop-color="#8657dc"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="11" stdDeviation="14" flood-color="#16467d" flood-opacity=".14"/></filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="170%"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#16467d" flood-opacity=".15"/></filter>
    <style>
      text{font-family:"Noto Sans JP","Yu Gothic","Meiryo",sans-serif}.navy{fill:#082e6b}.muted{fill:#3970b4}.heading{font-weight:800}.body{font-weight:700}.label{font-size:16px;font-weight:700;fill:#4973aa}
    </style>
  </defs>
  <rect x="2" y="2" width="1796" height="596" rx="34" fill="url(#bg)" stroke="#bfd5ee" stroke-width="4"/>
  <path d="M0 430c227 21 334 126 571 102 251-26 360-97 606-31 210 57 355 84 623-35v134H0z" fill="url(#wave)"/>
  <path d="M0 519c248-41 425 46 644 63 293 22 516-81 751-66 161 10 275 4 405-31" fill="none" stroke="#fff" stroke-width="3"/>
  <g fill="#d5e8fb">
    <circle cx="68" cy="53" r="4"/><circle cx="94" cy="53" r="4"/><circle cx="120" cy="53" r="4"/><circle cx="146" cy="53" r="4"/>
    <circle cx="68" cy="79" r="4"/><circle cx="94" cy="79" r="4"/><circle cx="120" cy="79" r="4"/><circle cx="146" cy="79" r="4"/>
    <circle cx="68" cy="105" r="4"/><circle cx="94" cy="105" r="4"/><circle cx="120" cy="105" r="4"/><circle cx="146" cy="105" r="4"/>
  </g>
  <text x="58" y="263" class="navy heading" font-size="68">次の行動をAIが提案</text>
  <text x="60" y="338" class="navy body" font-size="31">案件ごとの注意点と対応候補をわかりやすく整理</text>

  <g filter="url(#shadow)">
    <rect x="850" y="90" width="350" height="420" rx="23" fill="#fff" stroke="#d9e8f7" stroke-width="2"/>
  </g>
  <g transform="translate(875 114)">
    <rect width="44" height="44" rx="11" fill="#edf5fd"/><path d="M15 9h12l8 8v21H15z" fill="#58a0ed"/><path d="M27 9v9h8" fill="none" stroke="#fff" stroke-width="2"/>
  </g>
  <text x="933" y="146" class="navy heading" font-size="23">案件詳細</text>
  <rect x="1087" y="116" width="88" height="34" rx="17" fill="#edf6ff" stroke="#91c1f4"/>
  <circle cx="1106" cy="133" r="11" fill="url(#blue)"/><path d="M1101 133l4 4 7-9" fill="none" stroke="#fff" stroke-width="2.5"/>
  <text x="1123" y="139" font-size="15" font-weight="700" fill="#1973dc">対応中</text>
  <line x1="875" y1="165" x2="1175" y2="165" stroke="#dce9f7" stroke-width="2"/>
  <text x="877" y="196" class="label">案件番号</text><text x="877" y="224" class="navy body" font-size="19">ACD-2025-00124</text>
  <line x1="875" y1="241" x2="1175" y2="241" stroke="#e4edf7"/>
  <text x="877" y="271" class="label">事故日</text><text x="990" y="271" class="navy body" font-size="17">2025/05/08</text>
  <text x="877" y="306" class="label">相手方</text><text x="990" y="306" class="navy body" font-size="17">株式会社△△△△</text>
  <text x="877" y="341" class="label">担当者</text><text x="990" y="341" class="navy body" font-size="17">山田 太郎</text>
  <text x="877" y="376" class="label">最終対応</text><text x="990" y="376" class="navy body" font-size="17">2025/05/10（3日前）</text>
  <text x="877" y="411" class="label">ステータス</text><rect x="990" y="389" width="71" height="31" rx="15" fill="#edf6ff" stroke="#a4cef6"/><text x="1025" y="411" text-anchor="middle" font-size="15" font-weight="700" fill="#1973dc">対応中</text>
  <rect x="875" y="440" width="300" height="52" rx="12" fill="#eef5ff"/>
  <circle cx="897" cy="466" r="12" fill="#287de4"/><text x="897" y="472" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">i</text>
  <text x="918" y="461" class="navy body" font-size="14">AIの提案は参考情報です。</text><text x="918" y="480" class="navy body" font-size="14">最終判断は担当者が行います。</text>

  <path d="M1202 210h42c13 0 13-20 27-20h15" fill="none" stroke="#68b9f3" stroke-width="4" stroke-dasharray="7 7"/>
  <path d="M1202 340h42c13 0 13 20 27 20h15" fill="none" stroke="#68b9f3" stroke-width="4" stroke-dasharray="7 7"/>

  <g filter="url(#shadow)">
    <rect x="1265" y="55" width="480" height="488" rx="24" fill="#fff" stroke="#3f8ef1" stroke-width="2"/>
  </g>
  <path d="M1513 31c8 26 18 36 43 44-25 8-35 18-43 44-8-26-18-36-43-44 25-8 35-18 43-44z" fill="url(#ai)"/>
  <rect x="1588" y="72" width="116" height="43" rx="12" fill="url(#ai)"/><text x="1646" y="101" text-anchor="middle" font-size="21" font-weight="800" fill="#fff">AI提案</text>

  <g filter="url(#soft)">
    <rect x="1282" y="105" width="446" height="192" rx="18" fill="#fff" stroke="#e3ebf7"/>
  </g>
  <line x1="1303" y1="126" x2="1303" y2="155" stroke="#2e80ec" stroke-width="5" stroke-linecap="round"/>
  <text x="1322" y="151" class="navy heading" font-size="25">次の行動</text>
  <g fill="#fff" stroke="#fff" stroke-width="3">
    <circle cx="1318" cy="187" r="13" fill="url(#blue)"/><path d="M1312 187l5 5 9-11" fill="none"/>
    <circle cx="1318" cy="230" r="13" fill="url(#blue)"/><path d="M1312 230l5 5 9-11" fill="none"/>
    <circle cx="1318" cy="273" r="13" fill="url(#blue)"/><path d="M1312 273l5 5 9-11" fill="none"/>
  </g>
  <text x="1345" y="193" class="navy body" font-size="16">相手方からの回答待ち（期限：○/○）</text>
  <text x="1345" y="236" class="navy body" font-size="16">追加書類の確認・不足分の依頼</text>
  <text x="1345" y="279" class="navy body" font-size="16">損害確認の結果レビューと方針検討</text>

  <g filter="url(#soft)">
    <rect x="1282" y="309" width="446" height="172" rx="18" fill="#fff" stroke="#e3ebf7"/>
  </g>
  <line x1="1303" y1="329" x2="1303" y2="358" stroke="#7654d7" stroke-width="5" stroke-linecap="round"/>
  <text x="1322" y="354" class="navy heading" font-size="25">注意点</text>
  <g fill="#7252d5">
    <path d="M1318 378l14 24h-28z"/><path d="M1318 422l14 24h-28z"/><path d="M1318 464l14 24h-28z"/>
  </g>
  <g fill="#fff" font-size="14" font-weight="800" text-anchor="middle">
    <text x="1318" y="397">!</text><text x="1318" y="441">!</text><text x="1318" y="483">!</text>
  </g>
  <text x="1345" y="398" class="navy body" font-size="15">7日以上未対応のため、早期対応を推奨</text>
  <text x="1345" y="442" class="navy body" font-size="15">担当者変更の履歴あり、引き継ぎを確認</text>
  <text x="1345" y="484" class="navy body" font-size="15">類似事案を参考に対応方針を要精査</text>

  <circle cx="1306" cy="513" r="17" fill="url(#blue)"/><circle cx="1306" cy="507" r="5" fill="#fff"/><path d="M1297 521c2-8 16-8 18 0" fill="#fff"/>
  <text x="1332" y="519" class="navy body" font-size="14">AIの提案内容を参考に、担当者がご確認ください</text>
  <circle cx="1700" cy="513" r="24" fill="url(#blue)"/><path d="M1688 513l9 9 17-20" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
