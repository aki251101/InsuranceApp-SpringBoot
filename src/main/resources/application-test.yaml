# ======================================================
# Day70 学習用：application-test.yaml（テスト用Profile設定）
# ======================================================
# spring.profiles.active=test のときに読み込まれる。
# application.yaml の同じキーを「上書き」する。
# テスト用なので最大登録数を少なくして、上限テストがしやすい設定。
# ======================================================

app:
  app-name: "タスク管理（テスト版）"
  env: "test"
  max-tasks: 3
