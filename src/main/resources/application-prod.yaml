# ============================================================
# Production プロファイル用設定（MySQL）
# ============================================================
# 起動時に以下で有効化:
#   --spring.profiles.active=production
# または環境変数:
#   SPRING_PROFILES_ACTIVE=production
# ============================================================

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/insuranceapp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

ai:
  client:
    type: gemini

# ※ファイル名を application-prod.yml にしたい場合の互換用コピーです。
