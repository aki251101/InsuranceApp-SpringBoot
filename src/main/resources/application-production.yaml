# production 用。現プロジェクトでは profile 名を production に統一
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/insuranceapp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    cache: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    jp.yoshiaki.insuranceapp: INFO

ai:
  client:
    type: gemini

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    model: ${GEMINI_API_MODEL:gemini-1.5-flash}
