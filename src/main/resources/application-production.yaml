spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/insuranceapp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

ai:
  client:
    type: gemini
