# ======================================================
# Day70 学習用：application-dev.yaml（開発用Profile設定）
# ======================================================
# spring.profiles.active=dev のときに読み込まれる。
# application.yaml の同じキーを「上書き」する。
# ======================================================

app:
  app-name: "タスク管理（開発版）"
  env: "development"
  max-tasks: 10

server:
  port: 8080
  error:
    include-message: always
