spring:
  application:
    name: InsuranceApp-SpringBoot

  # ===== H2データベース設定（学習用）=====
  datasource:
    url: jdbc:h2:mem:day66;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # ===== JPA設定 =====
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===== H2 Console（ブラウザでDB確認用）=====
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
