spring:
  application:
    name: InsuranceApp-SpringBoot

  # ===== H2データベース設定（学習用） =====
  datasource:
    url: jdbc:h2:mem:day66;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # ===== JPA設定 =====
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===== H2 Console（ブラウザでDB確認用） =====
  h2:
    console:
      enabled: true
      path: /h2-console

  # ===== Profile設定（Day70で追加） =====
  profiles:
    active: dev

server:
  port: 8080

# ===== アプリ独自設定（Day70で追加） =====
app:
  app-name: "タスク管理"
  version: "1.0.0"
  env: "default"
  max-tasks: 5