<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">損保業務支援アプリ ダッシュボード全景</title>
  <desc id="desc">契約更新、期限通知、事故滞留、カレンダー連携、AI支援の5機能を示すサムネイル</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4f1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="22" flood-color="#153f70" flood-opacity=".17"/>
    </filter>
    <style>
      text { font-family: "Yu Gothic", "Meiryo", sans-serif; fill: #082e6b; }
      .bold { font-weight: 700; }
      .muted { fill: #52779d; }
      .blue { fill: #176fd7; }
      .green { fill: #19a374; }
      .orange { fill: #ee9417; }
      .purple { fill: #6a61d8; }
      .white { fill: #ffffff; }
      .card { fill: #ffffff; stroke: #cfe1f3; stroke-width: 2; }
      .pill-blue { fill: #eef6ff; stroke: #176fd7; stroke-width: 2; }
      .pill-green { fill: #eefaf5; stroke: #19a374; stroke-width: 2; }
      .pill-orange { fill: #fff7e8; stroke: #ee9417; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>

  <!-- Left introduction -->
  <text x="70" y="132" font-size="20" class="bold blue" letter-spacing="1">INSURANCE OPERATIONS</text>
  <text x="70" y="238" font-size="72" class="bold">損保業務</text>
  <text x="70" y="334" font-size="72" class="bold">支援アプリ</text>
  <text x="70" y="420" font-size="29" class="bold">契約更新と事故対応を、</text>
  <text x="70" y="468" font-size="29" class="bold">5つの機能で一元管理。</text>

  <g font-size="17" class="bold blue" text-anchor="middle">
    <rect x="70" y="526" width="127" height="42" rx="21" class="pill-blue"/>
    <text x="133.5" y="553">更新状況</text>
    <rect x="212" y="526" width="127" height="42" rx="21" class="pill-blue"/>
    <text x="275.5" y="553">期限通知</text>
    <rect x="70" y="584" width="127" height="42" rx="21" class="pill-blue"/>
    <text x="133.5" y="611">事故滞留</text>
    <rect x="212" y="584" width="127" height="42" rx="21" class="pill-blue"/>
    <text x="275.5" y="611">AI支援</text>
  </g>

  <!-- Dashboard shell -->
  <g filter="url(#shadow)">
    <rect x="500" y="55" width="1035" height="765" rx="30" fill="#ffffff"/>
  </g>
  <rect x="500" y="55" width="1035" height="765" rx="30" fill="#ffffff"/>
  <path d="M530 55h26c16.6 0 30 13.4 30 30v705c0 16.6-13.4 30-30 30h-26c-16.6 0-30-13.4-30-30V85c0-16.6 13.4-30 30-30z" fill="#0b3978"/>
  <text x="621" y="98" font-size="26" class="bold">業務ダッシュボード</text>

  <!-- Sidebar navigation -->
  <g>
    <rect x="518" y="150" width="50" height="50" rx="13" fill="#1d72dd"/>
    <rect x="518" y="232" width="50" height="50" rx="13" fill="#ffffff"/>
    <rect x="518" y="314" width="50" height="50" rx="13" fill="#ffffff"/>
    <rect x="518" y="396" width="50" height="50" rx="13" fill="#ffffff"/>
    <rect x="518" y="478" width="50" height="50" rx="13" fill="#ffffff"/>
    <rect x="518" y="560" width="50" height="50" rx="13" fill="#ffffff"/>
  </g>

  <!-- AI assistant card -->
  <rect x="615" y="149" width="887" height="257" rx="18" class="card"/>
  <rect x="633" y="167" width="51" height="51" rx="14" class="purple"/>
  <text x="658.5" y="200" font-size="21" class="bold white" text-anchor="middle">AI</text>
  <text x="697" y="196" font-size="25" class="bold">業務AIアシスト</text>
  <text x="697" y="220" font-size="15" class="bold muted">契約の要約と事故対応の提案</text>

  <rect x="643" y="248" width="408" height="44" rx="22" class="pill-blue"/>
  <text x="847" y="277" font-size="19" class="bold blue" text-anchor="middle">契約詳細｜AI要約</text>
  <rect x="1066" y="248" width="409" height="44" rx="22" class="pill-green"/>
  <text x="1270.5" y="277" font-size="19" class="bold green" text-anchor="middle">事故詳細｜AI提案</text>

  <circle cx="661" cy="333" r="9" class="purple"/>
  <text x="682" y="340" font-size="16" class="bold">契約期間・状態を短く整理</text>
  <circle cx="661" cy="368" r="9" class="purple"/>
  <text x="682" y="375" font-size="16" class="bold">次の対応候補と注意点を提案</text>

  <!-- Early renewal rate -->
  <rect x="615" y="426" width="433" height="195" rx="18" class="card"/>
  <rect x="633" y="443" width="51" height="51" rx="14" fill="#176fd7"/>
  <text x="658.5" y="476" font-size="22" class="bold white" text-anchor="middle">%</text>
  <text x="697" y="472" font-size="25" class="bold">早期更改率</text>
  <text x="697" y="497" font-size="15" class="bold muted">更新状況をひと目で確認</text>
  <text x="648" y="583" font-size="54" class="bold blue">75</text>
  <text x="718" y="579" font-size="25" class="bold blue">%</text>
  <rect x="648" y="598" width="367" height="17" rx="8.5" fill="#e4eef8"/>
  <rect x="648" y="598" width="275" height="17" rx="8.5" fill="#176fd7"/>

  <!-- Renewal deadline alert -->
  <rect x="1067" y="426" width="435" height="195" rx="18" class="card"/>
  <rect x="1085" y="443" width="51" height="51" rx="14" fill="#ee9417"/>
  <text x="1110.5" y="477" font-size="23" class="bold white" text-anchor="middle">!</text>
  <text x="1149" y="472" font-size="25" class="bold">更新期限アラート</text>
  <text x="1149" y="497" font-size="15" class="bold muted">期限超過を要注意で通知</text>
  <rect x="1095" y="519" width="379" height="77" rx="14" fill="#ffffff" stroke="#cfe1f3" stroke-width="2"/>
  <text x="1114" y="537" font-size="16" class="bold">業務一覧</text>
  <line x1="1107" y1="545" x2="1462" y2="545" stroke="#dfebf6"/>
  <circle cx="1120" cy="557" r="7" fill="#ee9417"/>
  <text x="1137" y="562" font-size="14" class="bold">P-2026-0107  更新期限 6/22</text>
  <line x1="1107" y1="566" x2="1462" y2="566" stroke="#dfebf6"/>
  <circle cx="1120" cy="577" r="7" fill="#ee9417"/>
  <text x="1137" y="582" font-size="14" class="bold">P-2026-0102  要注意</text>
  <line x1="1107" y1="587" x2="1462" y2="587" stroke="#dfebf6"/>
  <circle cx="1120" cy="596" r="7" fill="#ee9417"/>
  <text x="1137" y="601" font-size="14" class="bold">P-2026-0002  更新予定</text>
  <rect x="1357" y="531" width="101" height="35" rx="17.5" class="pill-orange"/>
  <text x="1407.5" y="555" font-size="17" class="bold orange" text-anchor="middle">要注意</text>

  <!-- Accident stagnation -->
  <rect x="615" y="641" width="433" height="151" rx="18" class="card"/>
  <rect x="633" y="659" width="51" height="51" rx="14" fill="#19a374"/>
  <text x="658.5" y="692" font-size="22" class="bold white" text-anchor="middle">事</text>
  <text x="697" y="688" font-size="25" class="bold">事故滞留</text>
  <text x="697" y="712" font-size="15" class="bold muted">最終対応からの日数を確認</text>
  <rect x="643" y="735" width="117" height="36" rx="18" class="pill-green"/>
  <text x="701.5" y="759" font-size="17" class="bold green" text-anchor="middle">対応中</text>
  <rect x="775" y="735" width="105" height="36" rx="18" class="pill-orange"/>
  <text x="827.5" y="759" font-size="17" class="bold orange" text-anchor="middle">滞留</text>
  <text x="899" y="759" font-size="15" class="bold">最終対応 7日前</text>

  <!-- Calendar integration -->
  <rect x="1067" y="641" width="435" height="151" rx="18" class="card"/>
  <rect x="1085" y="659" width="51" height="51" rx="14" fill="#176fd7"/>
  <text x="1110.5" y="692" font-size="22" class="bold white" text-anchor="middle">31</text>
  <text x="1149" y="688" font-size="25" class="bold">カレンダー連携</text>
  <text x="1149" y="712" font-size="15" class="bold muted">更新予定をリマインド</text>
  <text x="1095" y="763" font-size="15" class="bold">契約一覧</text>
  <text x="1190" y="763" font-size="27" class="bold blue">→</text>
  <text x="1242" y="763" font-size="15" class="bold">Google カレンダー</text>
  <rect x="1391" y="734" width="87" height="37" rx="18.5" class="pill-blue"/>
  <text x="1434.5" y="759" font-size="17" class="bold blue" text-anchor="middle">登録</text>
</svg>
