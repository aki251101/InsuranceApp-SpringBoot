<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新規登録画面デザイン案</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #092754;
      --muted: #607593;
      --line: #d8e2ef;
      --brand: #0b4bad;
      --brand-dark: #0a448f;
      --green: #19a463;
      --orange: #f0a52b;
      --red: #e33434;
      --soft-blue: #f1f6ff;
      --shadow: 0 8px 20px rgba(23, 55, 97, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Noto Sans JP", "Yu Gothic UI", sans-serif;
    }

    .screen {
      width: min(1340px, calc(100% - 40px));
      margin: 30px auto 50px;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: center;
      margin-bottom: 20px;
    }

    .breadcrumbs {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .breadcrumbs a {
      color: #396a9f;
      text-decoration: underline;
    }

    .breadcrumbs span {
      margin: 0 8px;
    }

    .cross-link {
      display: inline-flex;
      flex: 0 0 auto;
      gap: 9px;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 16px;
      border: 1px solid var(--brand);
      border-radius: 7px;
      color: var(--brand);
      background: #fff;
      font-weight: 800;
      text-decoration: none;
    }

    .title {
      margin: 0;
      font-size: 2.45rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 14px 0 20px;
      flex-wrap: wrap;
    }

    .heading-label {
      color: var(--muted);
      font-weight: 700;
    }

    .heading strong {
      font-size: 1.85rem;
    }

    .status-badge,
    .mini-badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid #aaddbc;
      border-radius: 999px;
      padding: 7px 13px;
      color: #0a8248;
      background: #eaf8ef;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-badge::before {
      content: "+";
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      margin-right: 7px;
      border-radius: 50%;
      color: white;
      background: var(--green);
      font-weight: 900;
    }

    .status-badge.blue {
      border-color: #a8c2e8;
      color: #1254a5;
      background: #edf5ff;
    }

    .status-badge.blue::before {
      background: var(--brand);
    }

    .layout {
      display: grid;
      gap: 18px;
    }

    .two-col {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
    }

    .side-col {
      grid-template-columns: minmax(340px, 0.76fr) minmax(0, 1.34fr);
    }

    .wide-left {
      grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
    }

    .card,
    .action-panel,
    .notice {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 25px;
      min-width: 0;
    }

    .card-title {
      margin: 0 0 18px;
      font-size: 1.25rem;
    }

    .form-grid {
      display: grid;
      gap: 15px;
    }

    .form-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    .field-label {
      color: #183963;
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      border: 1px solid #afbdd0;
      border-radius: 7px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.6;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .info-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    .info-table th,
    .info-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    .info-table th {
      width: 42%;
      background: #fbfdff;
      color: #274767;
    }

    .info-table tr:last-child th,
    .info-table tr:last-child td {
      border-bottom: 0;
    }

    .computed {
      display: grid;
      gap: 14px;
    }

    .date-pair {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .date-block {
      display: grid;
      gap: 4px;
    }

    .date-block:last-child {
      text-align: right;
    }

    .date-label {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .date-value {
      font-size: 1.05rem;
      font-weight: 800;
    }

    .track {
      height: 7px;
      margin: 2px 8px 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), #377cc5);
    }

    .notice {
      margin-bottom: 18px;
      padding: 17px 20px;
      color: #1855a6;
      background: var(--soft-blue);
      font-weight: 800;
      box-shadow: none;
    }

    .notice.warn {
      border-color: #f2b24b;
      color: #aa5e00;
      background: #fffaf0;
    }

    .notice::before {
      content: "i";
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      margin-right: 11px;
      border-radius: 50%;
      color: #fff;
      background: var(--brand);
      font-family: Georgia, serif;
    }

    .notice.warn::before {
      content: "!";
      background: var(--orange);
      font-family: inherit;
    }

    .action-panel {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-top: 18px;
      padding: 20px 22px;
      flex-wrap: wrap;
    }

    .spacer {
      flex: 1;
    }

    .button {
      min-height: 46px;
      padding: 10px 25px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      color: var(--brand);
      background: #fff;
      font-weight: 800;
      text-decoration: none;
      cursor: default;
    }

    .button.primary {
      min-width: 210px;
      color: #fff;
      background: var(--brand-dark);
    }

    .button.ghost {
      color: #3e5c7b;
      border-color: #c9d8ea;
    }

    .search-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px;
      gap: 10px;
      align-items: end;
    }

    .search-box .button {
      width: 100%;
      min-width: 0;
      padding-right: 14px;
      padding-left: 14px;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
    }

    .result-row.selected {
      border-color: #8fc4ad;
      background: #f1fbf6;
    }

    .result-main {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .result-main strong {
      font-size: 1.05rem;
    }

    .result-meta {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-size: 0.87rem;
      flex-wrap: wrap;
    }

    .select-button {
      min-height: 38px;
      padding: 7px 14px;
      border: 1px solid var(--brand);
      border-radius: 7px;
      color: var(--brand);
      background: #fff;
      font-weight: 800;
    }

    .select-button.selected {
      border-color: #74bd9b;
      color: #0a8248;
      background: #eaf8ef;
    }

    .selected-policy {
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid #9bdab7;
      border-radius: 10px;
      background: #effcf6;
    }

    .selected-policy strong {
      font-size: 1.25rem;
    }

    .compact-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-tile {
      padding: 14px;
      border: 1px solid #cbd9eb;
      border-radius: 10px;
      background: #fbfdff;
    }

    .summary-tile span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .summary-tile strong {
      display: block;
      margin-top: 6px;
      font-size: 1rem;
    }

    .stepper {
      display: grid;
      gap: 14px;
    }

    .step {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .step-number {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #fff;
      background: var(--brand);
      font-weight: 900;
    }

    .step-body {
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .step:last-child .step-body {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .step-body h3 {
      margin: 3px 0 8px;
      font-size: 1.05rem;
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    .mini-table th,
    .mini-table td {
      padding: 11px 10px;
      border-bottom: 1px solid #e5edf7;
      text-align: left;
      font-size: 0.92rem;
    }

    .mini-table th {
      color: #264a75;
      background: #f4f8fd;
    }

    .variant-note {
      width: fit-content;
      margin: -34px 18px 14px auto;
      padding: 8px 12px;
      border: 1px solid #c9d8ea;
      border-radius: 999px;
      color: #456381;
      background: rgba(255,255,255,0.92);
      font-size: 0.82rem;
      font-weight: 800;
    }

    @media (max-width: 900px) {
      .two-col,
      .side-col,
      .wide-left {
        grid-template-columns: 1fr;
      }

      .form-grid.two,
      .compact-summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
