      .muted{fill:#607593}.navtext{fill:#fff}.label{font-size:16px;font-weight:700}
      .value{font-size:17px}.cardtitle{font-size:20px;font-weight:700}.line{stroke:#d9e2ee}
      .icon{fill:none;stroke:#1757ad;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
      .button{font-size:17px;font-weight:700}.small{font-size:14px}.rowicon{fill:#4779ba}
