  <rect x="980" y="633" width="610" height="127" rx="12" fill="#fbfcfe" stroke="#cbd8e8"/>
  <circle cx="1035" cy="687" r="28" fill="#fff7df" stroke="#f8c44d"/>
  <path d="M1026 694h18M1029 692v-10c0-10 12-10 12 0v10M1032 699h6" fill="none" stroke="#f09a00" stroke-width="2.5" stroke-linecap="round"/>
